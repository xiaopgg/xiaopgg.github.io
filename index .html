		<h1 style='text-align:center;'>自我介绍<h1>
		<p>您好，我叫雷普，是一名软件开发工程师，我喜欢编程，在我上初中的时候，我就喜欢玩电脑，那时候想着将来做一名黑客，看见电影里面那些玩电脑的高手敲几个命令就能让一座城市瘫痪，那时候觉得，这些人好牛逼，后来我就喜欢上了玩电脑，大学报考的就是软件工程专业，入了这行后我才发现，原来实际与我想象中的并不相同，我变成了一个码农，但是我仍然喜欢编程，喜欢接触新的技术，喜欢自己钻研问题，在以前的公司中我负责安卓和java开发，也了解了一些前端的东西。因为某些原因我辞职了。希望您看到这段话给我一个机会! (这个网页是我买的一个域名通过连接github 解析展现在这里的)</p>	</body>
